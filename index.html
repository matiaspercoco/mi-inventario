<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pro Móvil</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Mi Inventario</h1>
            <p id="date-display"></p>
        </header>
        
        <div id="alerts"></div>

        <section class="form-container">
            <form id="inventory-form">
                <input type="text" id="name" placeholder="Producto" required>
                <div class="row">
                    <input type="number" id="quantity" placeholder="Stock" required>
                    <input type="number" id="min-stock" placeholder="Mínimo" required>
                </div>
                <button type="submit" class="btn-add">➕ Agregar Producto</button>
                <button type="button" id="download-excel" class="btn-excel">📊 Exportar Excel Pro</button>
            </form>
        </section>

        <section class="inventory-list">
            <table id="inventory-table">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Stock</th>
                        <th>Mínimo</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="inventory-body"></tbody>
            </table>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
